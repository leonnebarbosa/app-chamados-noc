# =================================
# Docker Compose para PRODUÇÃO (Portainer/Swarm)
# Use este arquivo no Portainer
# =================================

version: "3.7"

services:
  # =================================
  # Aplicação Next.js
  # =================================
  app:
    image: leonnecb/noc-chamados:latest
    
    environment:
      - DATABASE_URL=postgresql://noc_user:${DB_PASSWORD:-noc_password}@db:5432/noc_chamados?schema=public
      - JWT_SECRET=${JWT_SECRET:-chave-secreta-jwt-minimo-32-caracteres}
      - NODE_ENV=production
      - APP_NAME=NOC Chamados
      - TZ=America/Sao_Paulo
    
    volumes:
      - noc_uploads:/app/public/uploads
    
    networks:
      - netMov
    
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.http.routers.noc_chamados.rule=Host(`chamados.xmov.com.br`)
        - traefik.http.routers.noc_chamados.entrypoints=websecure
        - traefik.http.routers.noc_chamados.tls.certresolver=letsencryptresolver
        - traefik.http.routers.noc_chamados.priority=1
        - traefik.http.routers.noc_chamados.service=noc_chamados
        - traefik.http.services.noc_chamados.loadbalancer.server.port=3000
        - traefik.http.services.noc_chamados.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.noc_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.noc_chamados.middlewares=noc_sslheader

  # =================================
  # Banco de Dados PostgreSQL
  # =================================
  db:
    image: postgres:16-alpine
    
    environment:
      - POSTGRES_USER=noc_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-noc_password}
      - POSTGRES_DB=noc_chamados
      - TZ=America/Sao_Paulo
    
    volumes:
      - noc_postgres:/var/lib/postgresql/data
    
    networks:
      - netMov
    
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

# =================================
# Volumes
# =================================
volumes:
  noc_postgres:
    external: true
    name: noc_postgres
  noc_uploads:
    external: true
    name: noc_uploads

# =================================
# Redes
# =================================
networks:
  netMov:
    external: true
    name: netMov
