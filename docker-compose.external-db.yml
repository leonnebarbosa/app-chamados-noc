# =================================
# Docker Compose para uso com PostgreSQL externo
# Use este arquivo se você já tem um PostgreSQL rodando
# =================================

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noc-chamados-app
    restart: unless-stopped
    environment:
      # Altere para seu PostgreSQL externo
      - DATABASE_URL=postgresql://usuario:senha@host-do-postgres:5432/noc_chamados?schema=public
      - JWT_SECRET=${JWT_SECRET:-sua-chave-secreta-forte-minimo-32-caracteres}
      - NODE_ENV=production
      - APP_NAME=NOC Chamados
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.noc-chamados.rule=Host(`chamados.seudominio.com.br`)"
      - "traefik.http.routers.noc-chamados.entrypoints=websecure"
      - "traefik.http.routers.noc-chamados.tls=true"
      - "traefik.http.routers.noc-chamados.tls.certresolver=letsencrypt"
      - "traefik.http.services.noc-chamados.loadbalancer.server.port=3000"

volumes:
  uploads_data:
    driver: local

networks:
  traefik-net:
    external: true
    name: traefik

